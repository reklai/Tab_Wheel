<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>__EXTENSION_NAME__ - Settings</title>
  <link rel="stylesheet" href="optionsPage.css" />
</head>
<body>
  <main class="settings-container">
    <div class="settings-titlebar">
      <div class="traffic-lights">
        <span class="dot dot-close"></span>
        <span class="dot dot-minimize"></span>
        <span class="dot dot-maximize"></span>
      </div>
      <span class="titlebar-text">__EXTENSION_NAME__ - Settings</span>
    </div>

    <section class="settings-body">
      <div class="settings-header">
        <h1>TabWheel</h1>
        <p class="subtitle">Fast modifier-wheel cycling for browser tabs.</p>
      </div>

      <label class="setting-row" for="cycleOrder" title="Left-right follows the visible browser tab order. Recent follows most-recently-used tabs.">
        <span>
          <strong>Cycle order</strong>
          <small>Use left-right browser tab order or most-recently-used tab order.</small>
        </span>
        <select class="setting-control" id="cycleOrder"></select>
      </label>

      <label class="setting-row" for="allowGesturesInEditableFields" title="Allow the wheel shortcut inside text boxes and rich editors.">
        <span>
          <strong>Allow modifier-wheel in editable fields</strong>
          <small>Enabled by default for text boxes and rich editors. Turn off if a site needs native editor wheel behavior.</small>
        </span>
        <input id="allowGesturesInEditableFields" type="checkbox" />
      </label>

      <label class="setting-row" for="invertScroll" title="Swap wheel down/up so down goes previous and up goes next.">
        <span>
          <strong>Invert wheel direction</strong>
          <small id="invertScrollHelp">Alt + wheel down becomes previous, and Alt + wheel up becomes next.</small>
        </span>
        <input id="invertScroll" type="checkbox" />
      </label>

      <label class="setting-row" for="gestureModifier" title="Base key for cycling and for opening quick controls.">
        <span>
          <strong>Wheel modifier</strong>
          <small>Choose Alt, Ctrl, or Meta for modifier-wheel cycling.</small>
        </span>
        <select class="setting-control" id="gestureModifier"></select>
      </label>

      <label class="setting-row" for="gestureWithShift" title="Add Shift to the selected modifier before wheel cycling is active.">
        <span>
          <strong>Add Shift to wheel shortcut</strong>
          <small>Requires Shift with the selected modifier.</small>
        </span>
        <input id="gestureWithShift" type="checkbox" />
      </label>

      <label class="setting-row" for="skipPinnedTabs" title="Keep pinned utility tabs out of the cycling path.">
        <span>
          <strong>Skip pinned tabs</strong>
          <small>Keep utility tabs out of wheel cycling.</small>
        </span>
        <input id="skipPinnedTabs" type="checkbox" />
      </label>

      <label class="setting-row" for="wrapAround" title="At the first or last tab, continue from the opposite edge.">
        <span>
          <strong>Wrap around</strong>
          <small>Continue from the other edge of the tab list.</small>
        </span>
        <input id="wrapAround" type="checkbox" />
      </label>

      <label class="setting-row" for="wheelAcceleration" title="Shortens the cooldown during repeated wheel bursts.">
        <span>
          <strong>Acceleration</strong>
          <small>Speed up repeated wheel tab switches during a short burst.</small>
        </span>
        <input id="wheelAcceleration" type="checkbox" />
      </label>

      <label class="setting-row" for="wheelSensitivity" title="Higher values need less wheel movement before switching tabs.">
        <span>
          <strong>Sensitivity</strong>
          <small>Higher values need less wheel movement before switching. Current: <span id="wheelSensitivityValue">1.0x</span></small>
        </span>
        <input class="setting-range" id="wheelSensitivity" type="range" step="0.1" />
      </label>

      <label class="setting-row" for="wheelCooldownMs" title="Minimum time between tab switches; lower feels faster but can overshoot.">
        <span>
          <strong>Cooldown</strong>
          <small>Minimum time between tab switches. Current: <span id="wheelCooldownValue">140ms</span></small>
        </span>
        <input class="setting-range" id="wheelCooldownMs" type="range" step="10" />
      </label>

      <div class="reference-grid" aria-label="Shortcut reference">
        <div><strong id="wheelShortcut">Alt + Wheel</strong><span>Cycle tabs using the selected tab order.</span></div>
        <div><strong>Modifier + Left Click</strong><span>Open quick controls on pages where content scripts are available.</span></div>
        <div><strong>Toolbar popup</strong><span>Open the same controls when page shortcuts are unavailable.</span></div>
      </div>
    </section>

    <div class="status-bar" id="statusBar"></div>
  </main>

  <script src="optionsPage.js"></script>
</body>
</html>
