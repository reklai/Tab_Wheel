<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="toolbarPopup.css" />
</head>
<body>
  <div class="tabwheel-popup">
    <div class="titlebar">
      <div class="traffic-lights">
        <span class="dot dot-close"></span>
        <span class="dot dot-minimize"></span>
        <span class="dot dot-maximize"></span>
      </div>
      <span class="titlebar-text">TabWheel</span>
      <span class="meta-pill" id="tabMeta">Tab</span>
    </div>

    <div class="hero">
      <strong id="shortcutLabel">Alt + Wheel</strong>
      <span>Fast wheel tab switching</span>
    </div>

    <section class="control-grid" aria-label="TabWheel controls">
      <label class="control-row" title="Left-right follows the visible browser tab order. Recent follows most-recently-used tabs.">
        <span><strong>Cycle order</strong><small>Left-right or recent tabs</small></span>
        <select id="cycleOrder"></select>
      </label>
      <label class="control-row" title="Base key for cycling and for opening quick controls.">
        <span><strong>Wheel modifier</strong><small>Base key for cycling</small></span>
        <select id="gestureModifier"></select>
      </label>
      <label class="control-row" title="Add Shift to the selected modifier before wheel cycling is active.">
        <span><strong>Require Shift</strong><small>Add Shift to the shortcut</small></span>
        <input id="gestureWithShift" type="checkbox" />
      </label>
      <label class="control-row" title="Swap wheel down/up so down goes previous and up goes next.">
        <span><strong>Invert wheel</strong><small>Swap next and previous</small></span>
        <input id="invertScroll" type="checkbox" />
      </label>
      <label class="control-row" title="Keep pinned utility tabs out of the cycling path.">
        <span><strong>Skip pinned tabs</strong><small>Ignore pinned tabs</small></span>
        <input id="skipPinnedTabs" type="checkbox" />
      </label>
      <label class="control-row" title="At the first or last tab, continue from the opposite edge.">
        <span><strong>Wrap around</strong><small>Loop at tab-list edges</small></span>
        <input id="wrapAround" type="checkbox" />
      </label>
      <label class="control-row" title="Shortens the cooldown during repeated wheel bursts.">
        <span><strong>Acceleration</strong><small>Speed up wheel bursts</small></span>
        <input id="wheelAcceleration" type="checkbox" />
      </label>
      <label class="control-row" title="Allow the wheel shortcut inside text boxes and rich editors.">
        <span><strong>Editable fields</strong><small>Allow shortcut in inputs</small></span>
        <input id="allowGesturesInEditableFields" type="checkbox" />
      </label>
      <label class="control-row range-row" title="Higher values need less wheel movement before switching tabs.">
        <span><strong>Sensitivity</strong><small id="wheelSensitivityValue">1.0x</small></span>
        <input id="wheelSensitivity" type="range" step="0.1" />
      </label>
      <label class="control-row range-row" title="Minimum time between tab switches; lower feels faster but can overshoot.">
        <span><strong>Cooldown</strong><small id="wheelCooldownValue">140ms</small></span>
        <input id="wheelCooldownMs" type="range" step="10" />
      </label>
    </section>

    <div class="action-row">
      <button id="helpBtn">Help</button>
      <button id="settingsBtn">Settings</button>
    </div>

    <div class="status-line" id="statusLine"></div>
  </div>
  <script src="toolbarPopup.js"></script>
</body>
</html>
